version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:5.0
    container_name: raccoon-cal-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: raccooncal
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    networks:
      - raccoon-cal-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: raccoon-cal-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass password
    volumes:
      - redis_data:/data
    networks:
      - raccoon-cal-network

  # Express 服务端
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: raccoon-cal-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      MONGODB_URI: mongodb://admin:password@mongodb:27017/raccooncal?authSource=admin
      REDIS_URL: redis://:password@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-for-development
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mongodb
      - redis
    volumes:
      - ./packages/server:/app
      - /app/node_modules
    networks:
      - raccoon-cal-network
    command: npm run dev

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: raccoon-cal-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    networks:
      - raccoon-cal-network

volumes:
  mongodb_data:
    driver: local
  redis_data:
    driver: local

networks:
  raccoon-cal-network:
    driver: bridge