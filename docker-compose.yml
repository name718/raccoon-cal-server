version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: raccoon-cal-mysql
    restart: unless-stopped
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: raccoon_cal
      MYSQL_USER: raccoon_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/mysql-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - raccoon-cal-network

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: raccoon-cal-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes --requirepass password
    volumes:
      - redis_data:/data
    networks:
      - raccoon-cal-network

  # Express 服务端
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    container_name: raccoon-cal-server
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: development
      PORT: 3000
      DATABASE_URL: mysql://raccoon_user:password@mysql:3306/raccoon_cal
      REDIS_URL: redis://:password@redis:6379
      JWT_SECRET: your-super-secret-jwt-key-for-development
      JWT_EXPIRES_IN: 7d
    depends_on:
      - mysql
      - redis
    volumes:
      - ./packages/server:/app
      - /app/node_modules
    networks:
      - raccoon-cal-network
    command: npm run dev

  # Nginx 反向代理 (可选)
  nginx:
    image: nginx:alpine
    container_name: raccoon-cal-nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - server
    networks:
      - raccoon-cal-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  raccoon-cal-network:
    driver: bridge
